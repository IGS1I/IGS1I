<svg width="600" height="400" viewBox="0 0 500 400" preserveAspectRatio="xMidYmid meet" xmlns="http://www.w3.org/2000/svg">
<style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1;} }
    @keyframes grow { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes draw { from { stroke-dashoffset: 100; opacity: 0; } to { stroke-dashoffset: 0; opacity: 1; } }
    @keyframes pop {
        0% { transform: scale(0); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }
    .axis-line { 
        stroke-dasharray: 140; 
        stroke-dashoffset: 140; 
        animation: draw 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; 
        will-change: stroke-dashoffset; 
    }
    .grid-ring { animation: fadeIn 0.5s ease-in forwards; opacity: 0; }
    .ring-1 { animation-delay: 0.1s; }
    .ring-2 { animation-delay: 0.2s; }
    .ring-3 { animation-delay: 0.3s; }
    .ring-4 { animation-delay: 0.4s; }
    .ring-5 { animation-delay: 0.5s; }
    .star-shape { transform-origin: 200px 200px; animation: pop 1.1s cubic-bezier(0.34, 1, 0.64, 1) 0.6s both; }
    .animate-in { animation: fadeIn 0.5s ease-in both }
    .delay-1 { animation-delay: 0.6s; }
    .delay-2 { animation-delay: 0.3s}
    .point { fill: #0933da00; cursor: pointer; }
    .point:hover + .tooltip { opacity: 1; }
    .tooltip {opacity: 0; transition: opacity 0.2s; pointer-events: none; }
</style>
